syntax = "proto3";

package tripo.user.v1;

option go_package = "buf_proto_example/gen/go/tripo/user/v1";

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  UserInfo user = 1;
}

message UserInfo {
  string id = 1;
  string name = 2;
  string email = 3;
}

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}
